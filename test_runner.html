<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Daily Planner Web - Tests</title>
    <style>
        body { font-family: 'Roboto', sans-serif; background: #121e26; color: #fdfdfd; padding: 20px; }
        h1 { color: #4a5c68; border-bottom: 1px solid #2e3e48; padding-bottom: 10px; }
        .pass { color: #4caf50; font-weight: bold; }
        .fail { color: #f44336; font-weight: bold; }
        .test-case { margin-bottom: 8px; padding: 8px; background: rgba(255,255,255,0.05); border-radius: 4px; }
        .summary { font-size: 1.2rem; margin-top: 20px; padding-top: 20px; border-top: 1px solid #2e3e48; }
    </style>
</head>
<body>
    <h1>Test Runner</h1>
    <div id="test-results"></div>

    <!-- MOCK DOM FOR app.js TO PREVENT CRASHES -->
    <script>
        // Prevent app.js from crashing when searching for buttons that don't exist
        const originalGetElementById = document.getElementById.bind(document);
        document.getElementById = function(id) {
            let el = originalGetElementById(id);
            if (!el && id !== 'test-results') {
                el = document.createElement('div');
                el.id = id;
                el.disabled = false;
                document.body.appendChild(el);
            }
            return el;
        };
    </script>

    <!-- Dependencies for app.js -->
    <script src="https://accounts.google.com/gsi/client"></script>
    <script src="https://apis.google.com/js/api.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@latest/Sortable.min.js"></script>
    
    <!-- App source -->
    <script src="app.js?v=2"></script>

    <!-- Test logic -->
    <script src="test_app.js?v=2"></script>
</body>
</html>
